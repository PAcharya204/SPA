<html>
<head>
    <title>Main page</title>

    <style>

 *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:linear-gradient(
    135deg,
    #eef5fc,
    #dce9f8,
    #eef5fc);
}

/* ================= HEADER ================= */

header{
    background:linear-gradient(
    90deg,
    #184C85,
    #2E6FB2);

    color:white;
    padding:25px 40px;

    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.logo-box{
    display:flex;
    align-items:center;
    gap:20px;
}

#logo{
    width:85px;
    height:85px;
    object-fit:contain;
    background:white;
    padding:8px;
    border-radius:18px;
}

.logo-box h1{
    font-size:34px;
    font-weight:700;
}

.logo-box p{
    font-size:15px;
    opacity:.9;
    margin-top:5px;
}

/* ================= TITLE ================= */

.page-title{
    text-align:center;
    margin-top:40px;
}

.page-title h2{
    color:#184C85;
    font-size:34px;
}

.page-title p{
    color:#666;
    margin-top:10px;
}

/* ================= LOGIN CARDS ================= */

#big1{
    width:90%;
    margin:50px auto;
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));
    gap:30px;
}

#big2{
    background:white;
    border-radius:22px;
    padding:40px 20px;
    text-align:center;

    box-shadow:
    0 10px 25px rgba(0,0,0,.08);

    transition:.3s;
    border-top:6px solid #2E6FB2;
}

#big2:hover{
    transform:translateY(-8px);
    box-shadow:
    0 15px 35px rgba(0,0,0,.15);
}

#big2 a{
    text-decoration:none;
}

#big2 i{
    font-size:50px;
    color:#2E6FB2;
    margin-bottom:20px;
}

#big2 h3{
    color:#184C85;
    font-size:22px;
}

/* ================= FOOTER ================= */

footer{
    text-align:center;
    padding:20px;
    color:#666;
    margin-top:40px;
}

/* ================= RESPONSIVE ================= */

@media(max-width:768px){

    .logo-box{
        flex-direction:column;
        text-align:center;
    }

    .logo-box h1{
        font-size:28px;
    }

}
    </style>
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

    <header>

        <div class="logo-box">

            <img src="images/logo.png" id="logo">

            <div>

                <h1>Student Performance Analysis System</h1>

                <p>
                    Academic Monitoring & Analytics Platform
                </p>

            </div>

        </div>

    </header>

    <br><hr><br>

    <div id="big1">

        <div id="big2">
            <a href="admin/ad_log.jsp">
                <i class="fa-solid fa-user-shield"></i>
                <h3>Admin Login</h3>
            </a>
        </div>

        <div id="big2">
            <a href="principal/princi_login.jsp">
                <i class="fa-solid fa-user-tie"></i>
                <h3>Principal Login</h3>
            </a>
        </div>

        <div id="big2">
            <a href="teacher/teach_login.jsp">
                <i class="fa-solid fa-chalkboard-user"></i>
                <h3>Teacher Login</h3>
            </a>
        </div>

        <div id="big2">
            <a href="student/stud_login.jsp">
                <i class="fa-solid fa-user-graduate"></i>
                <h3>Student Login</h3>
            </a>
        </div>

    </div>

</body>
</html>
